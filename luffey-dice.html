<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Luffey Dice — Roll Virtual Dice Online</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Nunito',sans-serif;
  background-color:#1a3fd4;
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 16px 60px;
  position:relative;overflow-x:hidden;
}

/* ── BACKGROUND CANVAS ── */
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

/* ── HEADER ── */
.site-title{font-size:52px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#fff;text-shadow:0 4px 0 rgba(0,0,100,0.35),0 0 20px rgba(255,220,0,0.4);margin-bottom:4px;position:relative;z-index:1;text-align:center;}
.site-subtitle{font-size:12px;font-weight:800;letter-spacing:3.5px;text-transform:uppercase;color:#a8c8ff;margin-bottom:28px;position:relative;z-index:1;text-align:center;}

/* ── CARD ── */
.card{background:rgba(255,255,255,0.13);backdrop-filter:blur(6px);border:2px solid rgba(255,255,255,0.25);border-radius:24px;padding:28px 32px 24px;width:100%;max-width:620px;margin-bottom:18px;position:relative;z-index:1;}
.card-title{font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;text-align:center;margin-bottom:16px;}

/* ── PILLS ── */
.pills-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:24px;}
.pill-select{border:2.5px solid rgba(255,255,255,0.5);border-radius:999px;background:rgba(255,255,255,0.15);color:#fff;font-family:'Nunito',sans-serif;font-size:12px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;padding:8px 20px;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;}
.pill-select option{background:#1a3fd4;color:#fff;}

/* ── DICE AREA ── */
.dice-area{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;align-items:center;min-height:120px;margin-bottom:24px;}

.die-wrap{width:96px;height:96px;position:relative;flex-shrink:0;}
.die{
  width:96px;height:96px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  position:absolute;inset:0;
  transition:background 0.3s;
}
.die::after{content:'';width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,0.92);display:block;}

/* spin + white flash animation */
.die-wrap.rolling .die{
  animation: dieSpinReveal 1.1s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes dieSpinReveal{
  0%   {transform:rotate(0deg) scale(1);   background:#fff;box-shadow:0 0 0 rgba(255,255,255,0);}
  15%  {transform:rotate(180deg) scale(0.7);background:#fff;box-shadow:0 0 30px #fff;}
  30%  {transform:rotate(360deg) scale(1.1);background:#fff;box-shadow:0 0 50px #fff;}
  50%  {transform:rotate(540deg) scale(0.85);background:#fff;box-shadow:0 0 20px #fff;}
  70%  {transform:rotate(700deg) scale(1.05);background:var(--die-color);box-shadow:0 7px 0 var(--die-shadow);}
  85%  {transform:rotate(710deg) scale(0.97);}
  100% {transform:rotate(720deg) scale(1);  background:var(--die-color);box-shadow:0 7px 0 var(--die-shadow);}
}

.die-red   {--die-color:#e74c3c;--die-shadow:#a83228;background:#e74c3c;box-shadow:0 7px 0 #a83228;}
.die-orange{--die-color:#e8950a;--die-shadow:#a56507;background:#e8950a;box-shadow:0 7px 0 #a56507;}
.die-yellow{--die-color:#f1c40f;--die-shadow:#a8890a;background:#f1c40f;box-shadow:0 7px 0 #a8890a;}
.die-green {--die-color:#27ae60;--die-shadow:#1a7a43;background:#27ae60;box-shadow:0 7px 0 #1a7a43;}
.die-blue  {--die-color:#2980b9;--die-shadow:#1a5882;background:#2980b9;box-shadow:0 7px 0 #1a5882;}
.die-purple{--die-color:#8e44ad;--die-shadow:#622e78;background:#8e44ad;box-shadow:0 7px 0 #622e78;}

/* ── LUFFEY ROLL special die ── */
.die-luffey{
  --die-color:#fff;--die-shadow:#ccc;
  background:#fff;box-shadow:0 7px 0 #ccc;
}
.die-luffey::after{display:none;}
.die-luffey .luffey-star{
  font-size:42px;line-height:1;
  filter:drop-shadow(0 0 8px rgba(255,200,0,0.9));
  animation:starPulse 0.6s ease-in-out infinite alternate;
}
@keyframes starPulse{from{transform:scale(0.9);}to{transform:scale(1.15);}}

/* LUFFEY ROLL animation override */
.die-wrap.rolling-luffey .die{
  animation: luffeySpinReveal 1.2s cubic-bezier(0.4,0,0.2,1) both;
}
@keyframes luffeySpinReveal{
  0%   {transform:rotate(0) scale(1);background:#fff;box-shadow:0 0 0 #fff;}
  20%  {transform:rotate(180deg) scale(0.7);background:#ffe44d;box-shadow:0 0 40px #ffe44d;}
  40%  {transform:rotate(360deg) scale(1.15);background:#fff;box-shadow:0 0 60px #fff;}
  60%  {transform:rotate(540deg) scale(0.9);background:#fffbe0;box-shadow:0 0 30px #ffe44d;}
  80%  {transform:rotate(680deg) scale(1.05);background:#fff;}
  100% {transform:rotate(720deg) scale(1);background:#fff;box-shadow:0 7px 0 #ccc;}
}

/* LUFFEY ROLL banner */
.luffey-banner{
  display:none;
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,50,0.7);
  z-index:100;
  align-items:center;justify-content:center;
  flex-direction:column;
  gap:10px;
}
.luffey-banner.show{display:flex;}
.luffey-banner-text{
  font-family:'Nunito',sans-serif;
  font-size:56px;font-weight:900;
  color:#ffe44d;
  text-shadow:0 0 30px #ffe44d,0 4px 0 #b8860b;
  letter-spacing:4px;text-transform:uppercase;
  animation:bannerPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
.luffey-banner-sub{font-family:'Nunito',sans-serif;font-size:20px;color:#fff;font-weight:800;letter-spacing:2px;}
@keyframes bannerPop{from{transform:scale(0.3);opacity:0;}to{transform:scale(1);opacity:1;}}

/* ── ROLL BUTTON ── */
.roll-btn{width:100%;padding:17px;background:linear-gradient(180deg,#f8c347 0%,#e8950a 100%);border:none;border-radius:999px;color:#fff;font-family:'Nunito',sans-serif;font-size:21px;font-weight:900;letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 7px 0 #b06800;transition:transform 0.1s,box-shadow 0.1s;outline:none;margin-bottom:16px;text-shadow:0 1px 2px rgba(0,0,0,0.2);}
.roll-btn:hover{transform:translateY(-2px);}
.roll-btn:active{transform:translateY(5px);box-shadow:0 2px 0 #b06800;}
.roll-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

/* ── POSSIBLE NOTE ── */
.possible-note{text-align:center;font-size:13px;font-weight:700;color:rgba(255,255,255,0.8);}
.possible-note .cr{color:#e74c3c;}.possible-note .co{color:#f5a623;}.possible-note .cy{color:#f1c40f;}.possible-note .cg{color:#2ecc71;}.possible-note .cb{color:#5dade2;}.possible-note .cp{color:#c39bd3;}

/* ── ROLL COUNTER ── */
.roll-counter{text-align:center;font-size:12px;font-weight:800;color:rgba(255,255,255,0.6);margin-bottom:10px;letter-spacing:1px;}
.roll-counter span{color:#ffe44d;}

/* ── HISTORY ── */
.hist-title{font-size:16px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#fff;text-align:center;margin-bottom:10px;}
.hist-divider{border:none;border-top:2px dashed rgba(255,255,255,0.25);margin-bottom:10px;}
.hist-empty{text-align:center;color:rgba(255,255,255,0.5);font-size:14px;font-weight:700;padding:10px 0;}
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1.5px dashed rgba(255,255,255,0.15);}
.hist-row:last-child{border-bottom:none;}
.hist-num{font-size:13px;font-weight:900;color:#ffe44d;min-width:34px;}
.hist-luffey-tag{font-size:10px;font-weight:900;background:#ffe44d;color:#1a3fd4;border-radius:6px;padding:1px 5px;margin-left:2px;}
.hist-squares{display:flex;gap:5px;flex:1;}
.hist-sq{width:28px;height:28px;border-radius:7px;flex-shrink:0;}
.hist-sq.die-red   {background:#e74c3c;}.hist-sq.die-orange{background:#e8950a;}.hist-sq.die-yellow{background:#f1c40f;}
.hist-sq.die-green {background:#27ae60;}.hist-sq.die-blue  {background:#2980b9;}.hist-sq.die-purple{background:#8e44ad;}
.hist-sq.die-luffey{background:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}
.hist-time{font-size:11px;font-weight:700;color:rgba(255,255,255,0.55);min-width:60px;text-align:right;}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- LUFFEY ROLL BANNER -->
<div class="luffey-banner" id="luffeyBanner" onclick="dismissBanner()">
  <div class="luffey-banner-text">⭐ LUFFEY ROLL! ⭐</div>
  <div class="luffey-banner-sub">Special roll activated! Tap to continue</div>
</div>

<div class="site-title">Luffey Dice</div>
<div class="site-subtitle">Roll Virtual Dice Online</div>

<div class="card">
  <div class="card-title">Roll Color Dice</div>
  <div class="pills-row">
    <select class="pill-select" id="diceCount">
      <option value="1">1 Dice</option><option value="2">2 Dice</option>
      <option value="3">3 Dice</option><option value="4" selected>4 Dice</option>
      <option value="5">5 Dice</option><option value="6">6 Dice</option>
    </select>
    <select class="pill-select"><option>Color Dice</option></select>
    <select class="pill-select"><option>Default</option></select>
  </div>
  <div class="roll-counter">Total rolls: <span id="rollCountDisplay">0</span> &nbsp;|&nbsp; Next Luffey Roll in: <span id="nextLuffey">15</span></div>
  <div class="dice-area" id="diceArea"></div>
  <button class="roll-btn" id="rollBtn" onclick="rollDice()">Roll Again !</button>
  <p class="possible-note">Possible colors are: <span class="cr">Red</span>, <span class="co">Orange</span>, <span class="cy">Yellow</span>, <span class="cg">Green</span>, <span class="cb">Blue</span> and <span class="cp">Purple</span>.</p>
</div>

<div class="card">
  <div class="hist-title">Your Last 20 Rolls</div>
  <hr class="hist-divider"/>
  <div id="histContainer"><div class="hist-empty">No rolls yet</div></div>
</div>

<script>
/* ══════════════════════════════════════
   BACKGROUND CANVAS — blue starfield
══════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [], sparkles = [];

  const STAR_COLORS = ['#ffffff','#ffe44d','#7ec8f5','#a8c8ff','#1a3fd4'];

  function resize(){
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    initStars();
  }

  function initStars(){
    stars = [];
    // static decorative stars (various types)
    for(let i=0;i<80;i++){
      stars.push({
        x: Math.random()*W, y: Math.random()*H,
        size: 4+Math.random()*22,
        color: STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)],
        type: Math.floor(Math.random()*4), // 0=filled,1=outline,2=sketchy,3=tiny4pt
        alpha: 0.3+Math.random()*0.7,
        rot: Math.random()*Math.PI*2,
        twinkleSpeed: 0.5+Math.random()*2,
        twinklePhase: Math.random()*Math.PI*2,
        drift: (Math.random()-0.5)*0.15
      });
    }
    // spiral/swirl decorations
    sparkles = [];
    for(let i=0;i<8;i++){
      sparkles.push({x:Math.random()*W,y:Math.random()*H,r:0,maxR:15+Math.random()*20,color:'rgba(255,255,255,0.4)'});
    }
  }

  function drawStar(ctx,cx,cy,r,color,alpha,type,rot,sketch){
    ctx.save();
    ctx.globalAlpha=alpha;
    ctx.translate(cx,cy);
    ctx.rotate(rot);

    if(type===0){
      // filled star
      ctx.fillStyle=color;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=i*Math.PI*2/5-Math.PI/2;
        const b=a+Math.PI/5;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
        ctx.lineTo(Math.cos(b)*r*0.42,Math.sin(b)*r*0.42);
      }
      ctx.closePath();ctx.fill();
    } else if(type===1){
      // outline star
      ctx.strokeStyle=color;ctx.lineWidth=2;
      ctx.beginPath();
      for(let i=0;i<5;i++){
        const a=i*Math.PI*2/5-Math.PI/2;
        const b=a+Math.PI/5;
        i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
        ctx.lineTo(Math.cos(b)*r*0.42,Math.sin(b)*r*0.42);
      }
      ctx.closePath();ctx.stroke();
    } else if(type===2){
      // sketchy hand-drawn star (multiple strokes)
      ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineCap='round';
      for(let pass=0;pass<3;pass++){
        ctx.beginPath();
        const jitter=()=>(Math.random()-0.5)*r*0.18;
        for(let i=0;i<5;i++){
          const a=i*Math.PI*2/5-Math.PI/2;
          const b=a+Math.PI/5;
          const px=Math.cos(a)*r+jitter(), py=Math.sin(a)*r+jitter();
          const qx=Math.cos(b)*r*0.42+jitter(), qy=Math.sin(b)*r*0.42+jitter();
          i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
          ctx.lineTo(qx,qy);
        }
        ctx.closePath();ctx.stroke();
      }
    } else {
      // 4-point sparkle
      ctx.fillStyle=color;
      ctx.beginPath();
      ctx.moveTo(0,-r);ctx.quadraticCurveTo(r*0.15,0,0,r);
      ctx.quadraticCurveTo(-r*0.15,0,0,-r);ctx.fill();
      ctx.beginPath();
      ctx.moveTo(-r,0);ctx.quadraticCurveTo(0,r*0.15,r,0);
      ctx.quadraticCurveTo(0,-r*0.15,-r,0);ctx.fill();
    }
    ctx.restore();
  }

  function drawSpiral(ctx,x,y,r,color){
    ctx.save();
    ctx.strokeStyle=color;ctx.lineWidth=2;ctx.lineCap='round';
    ctx.beginPath();
    for(let t=0;t<Math.PI*4;t+=0.1){
      const rx=x+t/(Math.PI*4)*r*Math.cos(t);
      const ry=y+t/(Math.PI*4)*r*Math.sin(t);
      t===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.stroke();ctx.restore();
  }

  let t=0;
  function draw(){
    ctx.clearRect(0,0,W,H);
    t+=0.016;

    stars.forEach(s=>{
      const twinkle=0.5+0.5*Math.sin(t*s.twinkleSpeed+s.twinklePhase);
      s.x+=s.drift;
      if(s.x>W+30)s.x=-30;
      if(s.x<-30)s.x=W+30;
      drawStar(ctx,s.x,s.y,s.size,s.color,s.alpha*(0.4+0.6*twinkle),s.type,s.rot,true);
    });

    // tiny dot sparkles
    for(let i=0;i<30;i++){
      const sx=(i*137+t*10)%W;
      const sy=(i*97+t*6)%H;
      const a=0.2+0.4*Math.abs(Math.sin(t+i));
      ctx.fillStyle=`rgba(255,255,255,${a})`;
      ctx.beginPath();ctx.arc(sx,sy,1+Math.sin(t*2+i)*0.5,0,Math.PI*2);ctx.fill();
    }

    // spiral decorations
    sparkles.forEach((sp,i)=>{
      drawSpiral(ctx,sp.x,sp.y,sp.maxR*(0.5+0.5*Math.sin(t*0.5+i)),'rgba(255,255,255,0.35)');
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',resize);
  resize();
  draw();
})();

/* ══════════════════════════════════════
   AUDIO — dice sound via Web Audio API
══════════════════════════════════════ */
const AC = new (window.AudioContext||window.webkitAudioContext)();

function playDiceRoll(){
  // Rattling dice sound: short burst of noise + pitched clicks
  const duration = 0.9;
  const buf = AC.createBuffer(1, AC.sampleRate*duration, AC.sampleRate);
  const data = buf.getChannelData(0);
  for(let i=0;i<data.length;i++){
    const t=i/AC.sampleRate;
    const env=Math.max(0,1-t/duration);
    // noise
    data[i]=(Math.random()*2-1)*env*0.4;
    // clicks
    if(i%(Math.floor(AC.sampleRate/18))===0 && t<0.7){
      data[i]+=(Math.random()*2-1)*env*0.8;
    }
  }
  const src=AC.createBufferSource();
  src.buffer=buf;
  // bandpass for wooden feel
  const bp=AC.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=900;bp.Q.value=0.8;
  // reverb
  const conv=AC.createConvolver();
  const rBuf=AC.createBuffer(1,AC.sampleRate*0.3,AC.sampleRate);
  const rData=rBuf.getChannelData(0);
  for(let i=0;i<rData.length;i++) rData[i]=(Math.random()*2-1)*Math.pow(1-i/rData.length,2);
  conv.buffer=rBuf;
  const gain=AC.createGain();gain.gain.value=0.6;
  src.connect(bp);bp.connect(conv);conv.connect(gain);gain.connect(AC.destination);
  src.start();
}

function playLuffeySound(){
  // Triumphant ascending chime
  const notes=[523,659,784,1047,1319];
  notes.forEach((freq,i)=>{
    const osc=AC.createOscillator();
    const g=AC.createGain();
    osc.type='sine';osc.frequency.value=freq;
    g.gain.setValueAtTime(0,AC.currentTime+i*0.12);
    g.gain.linearRampToValueAtTime(0.3,AC.currentTime+i*0.12+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.12+0.4);
    osc.connect(g);g.connect(AC.destination);
    osc.start(AC.currentTime+i*0.12);
    osc.stop(AC.currentTime+i*0.12+0.5);
  });
}

/* ══════════════════════════════════════
   GAME STATE
══════════════════════════════════════ */
const COLORS=['red','orange','yellow','green','blue','purple'];
let rollHistory=[];
let totalRolls=0;
let pendingLuffeyNext=false; // next roll after luffey roll shows variety

function pick(a){return a[Math.floor(Math.random()*a.length)];}
function fmt(d){let h=d.getHours(),m=d.getMinutes(),ap=h>=12?'PM':'AM';h=h%12||12;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')} ${ap}`;}

function updateCounter(){
  document.getElementById('rollCountDisplay').textContent=totalRolls;
  const next=15-(totalRolls%15);
  document.getElementById('nextLuffey').textContent=next===15?'15':next;
}

/* ── LUFFEY ROLL: every 15 rolls ── */
function isLuffeyRoll(){return totalRolls>0 && totalRolls%15===0;}

function dismissBanner(){
  document.getElementById('luffeyBanner').classList.remove('show');
}

/* Build a "variety" result: 4 different colors guaranteed */
function buildVarietyResult(count){
  const shuffled=[...COLORS].sort(()=>Math.random()-0.5);
  const result=[];
  for(let i=0;i<count;i++) result.push(shuffled[i%shuffled.length]);
  // shuffle again
  return result.sort(()=>Math.random()-0.5);
}

/* ── MAIN ROLL FUNCTION ── */
function rollDice(){
  if(AC.state==='suspended') AC.resume();

  totalRolls++;
  updateCounter();

  const count=parseInt(document.getElementById('diceCount').value,10);
  const area=document.getElementById('diceArea');
  area.innerHTML='';

  const btn=document.getElementById('rollBtn');
  btn.disabled=true;

  const luffey=isLuffeyRoll();
  const variety=pendingLuffeyNext;
  pendingLuffeyNext=false;

  let colors=[];
  let animClass='rolling';

  if(luffey){
    // All dice white with gold star
    playLuffeySound();
    colors=Array(count).fill('luffey');
    animClass='rolling-luffey';
    pendingLuffeyNext=true;
    // show banner after brief delay
    setTimeout(()=>{
      document.getElementById('luffeyBanner').classList.add('show');
    },1300);
  } else if(variety){
    playDiceRoll();
    colors=buildVarietyResult(count);
  } else {
    playDiceRoll();
    for(let i=0;i<count;i++) colors.push(pick(COLORS));
  }

  // Build dice elements
  colors.forEach((color,i)=>{
    const wrap=document.createElement('div');
    wrap.className=`die-wrap ${animClass}`;
    wrap.style.animationDelay=(i*80)+'ms';

    const die=document.createElement('div');
    if(color==='luffey'){
      die.className='die die-luffey';
      const star=document.createElement('div');
      star.className='luffey-star';
      star.textContent='⭐';
      die.appendChild(star);
    } else {
      die.className=`die die-${color}`;
    }
    // stagger each die's own animation
    die.style.animationDelay=(i*90)+'ms';
    wrap.appendChild(die);
    area.appendChild(wrap);
  });

  // re-enable button after animation
  const delay=1200+count*90;
  setTimeout(()=>{ btn.disabled=false; },delay);

  // add to history
  rollHistory.unshift({colors,time:new Date(),luffey,variety});
  if(rollHistory.length>20) rollHistory.pop();
  renderHistory();
}

function renderHistory(){
  const c=document.getElementById('histContainer');
  if(!rollHistory.length){c.innerHTML='<div class="hist-empty">No rolls yet</div>';return;}
  c.innerHTML='';
  rollHistory.forEach((entry,idx)=>{
    const row=document.createElement('div');row.className='hist-row';
    const num=document.createElement('div');num.className='hist-num';
    num.innerHTML='#'+(rollHistory.length-idx)+(entry.luffey?'<span class="hist-luffey-tag">LUFFEY</span>':'');
    const sqs=document.createElement('div');sqs.className='hist-squares';
    entry.colors.forEach(color=>{
      const sq=document.createElement('div');
      sq.className=`hist-sq die-${color}`;
      if(color==='luffey') sq.textContent='⭐';
      sqs.appendChild(sq);
    });
    const t=document.createElement('div');t.className='hist-time';t.textContent=fmt(entry.time);
    row.appendChild(num);row.appendChild(sqs);row.appendChild(t);
    c.appendChild(row);
  });
}

updateCounter();
</script>
</body>
</html>
